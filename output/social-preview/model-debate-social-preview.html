<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Model Debate Social Preview</title>
    <style>
      :root {
        color-scheme: dark;
        --bg: #09111f;
        --bg-2: #0f1d33;
        --card: rgba(8, 14, 28, 0.86);
        --line: rgba(255, 255, 255, 0.08);
        --line-strong: rgba(122, 162, 255, 0.24);
        --text: #f3f7ff;
        --muted: #b2c0d8;
        --accent: #74c0fc;
        --accent-2: #7ee787;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        margin: 0;
        width: 1280px;
        height: 640px;
        overflow: hidden;
        background:
          radial-gradient(circle at top left, rgba(126, 231, 135, 0.12), transparent 28%),
          radial-gradient(circle at 85% 20%, rgba(116, 192, 252, 0.18), transparent 30%),
          linear-gradient(135deg, var(--bg), var(--bg-2));
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body::before {
        content: "";
        position: absolute;
        inset: 0;
        background-image:
          linear-gradient(to right, transparent 0, transparent 63px, rgba(255, 255, 255, 0.03) 64px),
          linear-gradient(to bottom, transparent 0, transparent 63px, rgba(255, 255, 255, 0.03) 64px);
        background-size: 64px 64px;
        mask-image: linear-gradient(to bottom, rgba(0, 0, 0, 0.75), transparent 90%);
        pointer-events: none;
      }

      .frame {
        position: relative;
        width: 100%;
        height: 100%;
        padding: 56px;
      }

      .card {
        position: relative;
        height: 100%;
        border: 1px solid var(--line);
        border-radius: 32px;
        background:
          linear-gradient(180deg, rgba(255, 255, 255, 0.04), rgba(255, 255, 255, 0.01)),
          var(--card);
        box-shadow:
          0 20px 80px rgba(0, 0, 0, 0.45),
          inset 0 1px 0 rgba(255, 255, 255, 0.05);
        overflow: hidden;
      }

      .card::before {
        content: "";
        position: absolute;
        inset: 0;
        background:
          radial-gradient(circle at 85% 20%, rgba(126, 231, 135, 0.08), transparent 28%),
          radial-gradient(circle at 15% 85%, rgba(116, 192, 252, 0.1), transparent 24%);
        pointer-events: none;
      }

      .card::after {
        content: none;
      }

      .card::after {
        content: "";
        position: absolute;
        right: 100px;
        top: 92px;
        width: 220px;
        height: 220px;
        border-radius: 999px;
        background: radial-gradient(circle, rgba(116, 192, 252, 0.08), transparent 68%);
        filter: blur(8px);
        pointer-events: none;
      }

      .content {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
        height: 100%;
        padding: 52px 56px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 12px;
        width: fit-content;
        padding: 10px 16px;
        border: 1px solid var(--line-strong);
        border-radius: 999px;
        background: rgba(116, 192, 252, 0.08);
        color: var(--text);
        font-size: 18px;
        font-weight: 600;
        letter-spacing: 0.02em;
      }

      .dot {
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: linear-gradient(180deg, var(--accent), var(--accent-2));
        box-shadow: 0 0 24px rgba(116, 192, 252, 0.55);
      }

      .hero {
        max-width: 1040px;
        margin-top: 22px;
      }

      h1 {
        margin: 0;
        font-size: 108px;
        line-height: 0.96;
        letter-spacing: -0.05em;
        font-weight: 800;
      }

      .subtitle {
        margin-top: 18px;
        color: var(--text);
        font-size: 38px;
        line-height: 1.2;
        font-weight: 600;
        max-width: 960px;
      }

      .footer {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 20px;
      }

      .flow {
        display: flex;
        align-items: center;
        gap: 14px;
        color: var(--text);
        font-size: 20px;
        font-weight: 600;
      }

      .pill {
        padding: 11px 15px;
        border: 1px solid var(--line);
        border-radius: 999px;
        background: rgba(255, 255, 255, 0.04);
        white-space: nowrap;
      }

      .arrow {
        color: rgba(255, 255, 255, 0.42);
      }

      .badge {
        padding: 12px 16px;
        border-radius: 16px;
        border: 1px solid rgba(126, 231, 135, 0.24);
        background: rgba(126, 231, 135, 0.08);
        color: #d8ffe0;
        font-size: 16px;
        font-weight: 700;
        letter-spacing: 0.02em;
      }
    </style>
  </head>
  <body>
    <main class="frame">
      <section class="card">
        <div class="content">
          <div>
            <div class="eyebrow">
              <span class="dot"></span>
              <span>Open source</span>
            </div>

            <div class="hero">
              <h1>Model Debate</h1>
              <div class="subtitle">Two AI models debate your technical decisions, grounded in your private codebase</div>
            </div>
          </div>

          <div class="footer">
            <div class="flow">
              <span class="pill">Critic vs Builder</span>
              <span class="arrow">-&gt;</span>
              <span class="pill">Round-by-round debate</span>
              <span class="arrow">-&gt;</span>
              <span class="pill">Decision memo</span>
            </div>

            <div class="badge">No data stored</div>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
